apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: steghub-persist-eks
  region: us-east-1
  version: "1.30"

availabilityZones:
  - us-east-1a
  - us-east-1b

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    availabilityZones:
      - us-east-1a
      - us-east-1b
    ssh:
      allow: false
    labels:
      role: worker
    tags:
      project: persisting-data-in-kubernetes

cloudWatch:
  clusterLogging:
    enableTypes: []
