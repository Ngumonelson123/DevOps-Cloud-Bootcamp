# Static/manual provisioning demo.
# Volume ID is filled in by scripts/create-manual-ebs-volume.sh after the
# cluster's nodes exist, so the volume lands in the same AZ as a node.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: manual-ebs-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-0c4252e67ec239a38
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: manual-ebs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-manual-pv
  labels:
    app: nginx-manual-pv
spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: nginx-storage
      persistentVolumeClaim:
        claimName: manual-ebs-pvc
